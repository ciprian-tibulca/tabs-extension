<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Groups</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="header-row">
      <h1>Tab Groups</h1>
      <div class="search-wrapper">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search groups or tabs..." autocomplete="off">
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="saved">Saved</button>
      <button class="tab" data-tab="open">Open</button>
    </div>
  </div>

  <div class="tab-panel active" id="panel-saved">
    <div id="saved-groups" class="group-list">
      <p class="empty-state">No saved groups yet</p>
    </div>
  </div>

  <div class="tab-panel" id="panel-open">
    <div id="open-groups" class="group-list">
      <p class="empty-state">No open tab groups</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
